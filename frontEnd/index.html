<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamify - El Centro</title>
    <meta name="description" content="Gamify - Tu plataforma gamificada de productividad universitaria" />

    <!-- Script de inicialización de modo oscuro -->
    <script>
      (function() {
        const theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>

    <!-- Tailwind CSS with Forms & Container Queries plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind Custom Theme (Material You Design System) -->

      tailwind.config = {

        theme: {

              "outline": "var(--outline)",

              "surface": "var(--surface)",

              "on-primary-fixed-variant": "var(--on-primary-fixed-variant)",
              "inverse-surface": "var(--inverse-surface)",
              "surface-container-highest": "var(--surface-container-highest)",

              "inverse-on-surface": "var(--inverse-on-surface)",

              "error": "var(--error)",

              "on-surface-variant": "var(--on-surface-variant)",
              "on-tertiary": "var(--on-tertiary)",
              "tertiary-fixed-dim": "var(--tertiary-fixed-dim)",
              "surface-container-lowest": "var(--surface-container-lowest)",
